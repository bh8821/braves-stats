  // ════════════════════════════════════════════════════════
  //  END OF DATA SECTION
  // ════════════════════════════════════════════════════════

  const { useState } = React;

  const calcAVG = p => p.ab > 0 ? p.h / p.ab : null;
  const calcOBP = p => {
    const d = p.ab + p.bb + p.hbp + p.sf;
    return d > 0 ? (p.h + p.bb + p.hbp) / d : null;
  };
  const fmt = v => v == null ? "—" : v.toFixed(3).replace(/^0/, "");
  // IP stored as exact fraction (e.g. 4/3 for 1⅓); display and ERA use outs
  const fmtIP  = ip => { const o=Math.round(ip*3); const f=Math.floor(o/3); const r=o%3; return r===0?`${f}`:`${f}${['','⅓','⅔'][r]}`; };
  const calcERA = (er, ip) => ip > 0 ? (er * 27 / Math.round(ip * 3)).toFixed(2) : "—";

  function buildBatting(games) {
    const m = {};
    for (const g of games) {
      for (const p of g.batting) {
        if (!m[p.name]) m[p.name] = { ...p, ab:0,h:0,rbi:0,r:0,bb:0,hbp:0,sf:0,k:0,sb:0,gp:0 };
        const t = m[p.name];
        t.gp++; t.ab+=p.ab; t.h+=p.h; t.rbi+=p.rbi; t.r+=p.r;
        t.bb+=p.bb; t.hbp+=p.hbp; t.sf+=p.sf; t.k+=p.k; t.sb+=p.sb;
      }
    }
    return Object.values(m);
  }

  function buildPitching(games) {
    const m = {};
    for (const g of games) {
      for (const p of g.pitching) {
        if (!m[p.name]) m[p.name] = { ...p, ip:0,hits:0,er:0,bb:0,k:0,pitches:0,gp:0,w:0,l:0,s:0,hld:0 };
        const t = m[p.name];
        t.gp++; t.ip+=p.ip; t.hits+=p.hits; t.er+=p.er;
        t.bb+=p.bb; t.k+=p.k; t.pitches+=p.pitches;
        if (p.result==="W") t.w++;
        if (p.result==="L") t.l++;
        if (p.result==="S") t.s++;
        if (p.result==="H") t.hld++;
      }
    }
    return Object.values(m);
  }

  const BAT_CATS = [
    { key:"avg", label:"AVG", sf: p => calcAVG(p)??-1,  fmt: p => fmt(calcAVG(p)) },
    { key:"obp", label:"OBP", sf: p => calcOBP(p)??-1,  fmt: p => fmt(calcOBP(p)) },
    { key:"h",   label:"H",   sf: p => p.h,              fmt: p => p.h },
    { key:"rbi", label:"RBI", sf: p => p.rbi,            fmt: p => p.rbi },
    { key:"r",   label:"R",   sf: p => p.r,              fmt: p => p.r },
    { key:"bb",  label:"BB",  sf: p => p.bb,             fmt: p => p.bb },
    { key:"k",   label:"K",   sf: p => p.k,              fmt: p => p.k, lo:true },
    { key:"sb",  label:"SB",  sf: p => p.sb,             fmt: p => p.sb },
  ];

  const PITCH_CATS = [
    { key:"era",  label:"ERA", sf: p => p.ip>0?p.er*27/Math.round(p.ip*3):99, fmt: p => calcERA(p.er,p.ip), lo:true },
    { key:"k",    label:"K",   sf: p => p.k,    fmt: p => p.k },
    { key:"ip",   label:"IP",  sf: p => p.ip,   fmt: p => fmtIP(p.ip) },
    { key:"bb",   label:"BB",  sf: p => p.bb,   fmt: p => p.bb, lo:true },
    { key:"hits", label:"H허용",sf: p => p.hits, fmt: p => p.hits, lo:true },
  ];

  const RS = {
    W:{ bg:"#14532d",color:"#4ade80",border:"#16a34a" },
    L:{ bg:"#450a0a",color:"#f87171",border:"#dc2626" },
    H:{ bg:"#422006",color:"#fbbf24",border:"#d97706" },
    S:{ bg:"#172554",color:"#60a5fa",border:"#2563eb" },
  };

  const ACC = ["#d97706","#64748b","#92400e"];

  function NumBadge({ num, top }) {
    return (
      <div style={{ width:22,height:22,borderRadius:4,flexShrink:0,marginRight:7,

          {num!=null?`#${num}`:""}
        </span>
      </div>
    );
  }

  function Tabs({ active, set, cats }) {
    return (
      <div style={{ display:"flex",overflowX:"auto",background:"#f8fafc",
        borderRadius:"8px 8px 0 0",border:"1px solid #e2e8f0",borderBottom:"none" }}>

          <button key={c.key} onClick={() => set(i)}
            style={{ background:"none",border:"none",padding:"9px 13px",fontSize:12,fontWeight:700,
              color:active===i?"#d97706":"#94a3b8",fontFamily:"sans-serif",letterSpacing:.5,

        ))}
      </div>

  function BatList({ players, catIdx }) {
    const cat = BAT_CATS[catIdx];
    const sorted = [...players].sort((a,b) => cat.lo ? cat.sf(a)-cat.sf(b) : cat.sf(b)-cat.sf(a));
    return (
      <div style={{ background:"#fff",borderRadius:"0 0 8px 8px",border:"1px solid #e2e8f0",

          return (

  function PitchList({ players, catIdx }) {
    const cat = PITCH_CATS[catIdx];

          const top = i<3;
          const era = p.ip>0?(p.er/p.ip*9).toFixed(2):"—";
          const rec = [p.w&&`${p.w}W`,p.l&&`${p.l}L`,p.s&&`${p.s}S`,p.hld&&`${p.hld}H`].filter(Boolean).join(" ");
          return (
            <div key={p.name} style={{ display:"flex",alignItems:"center",padding:"9px 12px",

                {["🥇","🥈","🥉"][i]??i+1}
              </div>
              <NumBadge num={p.num} top={top} />
              <div style={{ flex:1,minWidth:0 }}>
                <span style={{ fontWeight:700,fontSize:13,color:"#0f172a" }}>{p.name}</span>
                <span style={{ fontSize:10,color:"#94a3b8",fontFamily:"sans-serif",marginLeft:5 }}>{p.gp}G</span>
                <div style={{ fontSize:11,color:"#64748b",fontFamily:"sans-serif",marginTop:1 }}>

                </div>
              </div>
              <div style={{ fontSize:19,fontWeight:900,fontFamily:"Arial Black,sans-serif",
                color:top?ACC[i]:"#334155",minWidth:48,textAlign:"right" }}>
                {cat.fmt(p)}
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  function PitchTable({ pitching }) {
    return (
      <div style={{ background:"#fff",borderRadius:8,border:"1px solid #e2e8f0",overflow:"hidden" }}>

        <div style={{ overflowX:"auto" }}>

              <tr style={{ color:"#94a3b8",fontSize:11,background:"#f8fafc" }}>
                {["#","선수","결과","IP","H","ER","BB","K","투구수","ERA"].map(h => (
                  <th key={h} style={{ padding:"7px 8px",textAlign:h==="선수"?"left":"center",fontWeight:600,whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {pitching.map((p,i) => {
                const era = calcERA(p.er, p.ip);
                const rs = RS[p.result]??{ bg:"#f1f5f9",color:"#64748b",border:"#e2e8f0" };
                return (
                  <tr key={p.name} style={{ borderTop:"1px solid #f1f5f9",background:i%2===0?"#fff":"#f8fafc" }}>
                    <td style={{ padding:"9px 8px",textAlign:"center",fontWeight:900,fontSize:11,color:"#94a3b8",fontFamily:"Arial Black,sans-serif" }}>
                      {p.num!=null?`#${p.num}`:""}
                    </td>
                    <td style={{ padding:"9px 8px",fontWeight:700,color:"#0f172a",whiteSpace:"nowrap" }}>{p.name}</td>
                    <td style={{ padding:"9px 8px",textAlign:"center" }}>
                      <span style={{ background:rs.bg,color:rs.color,border:`1px solid ${rs.border}`,

                    </td>
                    {[fmtIP(p.ip),p.hits,p.er,p.bb,p.k,p.pitches||"—"].map((v,j) => (

          </table>

      </div>

          </div>
        </div>

        <div style={{ maxWidth:700,margin:"0 auto",padding:16 }}>

          {/* ══ GAME VIEW ══ */}
          {view==="game" && g && (
            <div>

                    <button key={gm.id} onClick={() => setSelGame(i)}
                      style={{ background:selGame===i?"#1e293b":"#fff",
                        color:selGame===i?"#f59e0b":"#64748b",
                        border:`1px solid ${selGame===i?"#1e293b":"#e2e8f0"}`,
                        borderRadius:6,padding:"5px 12px",fontSize:12,fontWeight:700,whiteSpace:"nowrap",fontFamily:"sans-serif" }}>

                </div>
              )}

              {/* score card */}
              <div style={{ background:"#1e293b",borderRadius:12,padding:20,marginBottom:12 }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16 }}>
                  <div>
                    <div style={{ fontSize:12,color:"#94a3b8",fontFamily:"sans-serif",marginBottom:6,letterSpacing:.5 }}>
                      {g.date} · vs {g.opponent}
                    </div>
                    <div style={{ fontSize:36,fontWeight:900,fontFamily:"Arial Black,sans-serif",lineHeight:1,
                      color:g.result==="W"?"#4ade80":"#f87171" }}>
                      {g.teamScore}
                      <span style={{ fontSize:18,color:"#475569",margin:"0 8px" }}>–</span>
                      {g.oppScore}
                    </div>
                  </div>
                  {(() => { const rs=RS[g.result]??RS.W; return (
                    <div style={{ background:rs.bg,border:`1px solid ${rs.border}`,borderRadius:8,padding:"8px 18px",textAlign:"center" }}>
                      <div style={{ fontSize:24,fontWeight:900,color:rs.color,fontFamily:"Arial Black,sans-serif" }}>{g.result}</div>
                    </div>
                  ); })()}
                </div>
                {(() => {
                  const t = g.batting.reduce((a,p) => ({
                    ab:a.ab+p.ab,h:a.h+p.h,rbi:a.rbi+p.rbi,r:a.r+p.r,
                    bb:a.bb+p.bb,hbp:a.hbp+p.hbp,sf:a.sf+p.sf,k:a.k+p.k,sb:a.sb+p.sb
                  }),{ab:0,h:0,rbi:0,r:0,bb:0,hbp:0,sf:0,k:0,sb:0});
                  return (
                    <div style={{ display:"flex",flexWrap:"wrap",gap:14,borderTop:"1px solid #334155",paddingTop:14 }}>
                      {[["H",t.h],["RBI",t.rbi],["BB",t.bb],["K",t.k],["SB",t.sb],
                        ["AVG",fmt(calcAVG(t))],["OBP",fmt(calcOBP(t))]].map(([l,v]) => (
                        <div key={l} style={{ textAlign:"center",minWidth:36 }}>
                          <div style={{ fontSize:17,fontWeight:700,color:"#f59e0b",fontFamily:"Arial Black,sans-serif" }}>{v}</div>
                          <div style={{ fontSize:10,color:"#475569",fontFamily:"sans-serif",letterSpacing:.5,marginTop:2 }}>{l}</div>
                        </div>
                      ))}
                    </div>
                  );
                })()}
              </div>

              <Tabs active={batCat} set={setBatCat} cats={BAT_CATS} />
              <BatList players={g.batting} catIdx={batCat} />
              <PitchTable pitching={g.pitching} />
            </div>
          )}

          {/* ══ SEASON VIEW ══ */}
          {view==="season" && (
            <div>
              <div style={{ marginBottom:16 }}>
                <div style={{ fontSize:20,fontWeight:900,fontFamily:"Arial Black,sans-serif",letterSpacing:1 }}>시즌 누적 스탯</div>
                <div style={{ fontSize:12,color:"#64748b",fontFamily:"sans-serif",marginTop:2 }}>{GAMES.length}경기 기준</div>
              </div>

              <div style={{ fontSize:11,letterSpacing:1.5,color:"#94a3b8",fontFamily:"sans-serif",fontWeight:700,marginBottom:6 }}>BATTING</div>
              <Tabs active={batCat} set={setBatCat} cats={BAT_CATS} />
              <BatList players={seaBat} catIdx={batCat} />

              <div style={{ fontSize:11,letterSpacing:1.5,color:"#94a3b8",fontFamily:"sans-serif",fontWeight:700,marginBottom:6,marginTop:4 }}>PITCHING</div>
              <Tabs active={pitCat} set={setPitCat} cats={PITCH_CATS} />
              <PitchList players={seaPit} catIdx={pitCat} />

              <div style={{ fontSize:11,letterSpacing:1.5,color:"#94a3b8",fontFamily:"sans-serif",fontWeight:700,marginBottom:8,marginTop:4 }}>GAME LOG</div>
              {GAMES.map((gm,i) => (
                <div key={gm.id} onClick={() => { setSelGame(i); setView("game"); }}
                  style={{ display:"flex",alignItems:"center",padding:"10px 14px",background:"#fff",
                    border:"1px solid #e2e8f0",borderRadius:8,marginBottom:6,cursor:"pointer",gap:12,
                    boxShadow:"0 1px 3px rgba(0,0,0,.04)" }}>
                  <span style={{ fontWeight:800,color:gm.result==="W"?"#16a34a":"#dc2626",fontFamily:"sans-serif",fontSize:13,width:20 }}>{gm.result}</span>
                  <span style={{ flex:1,fontWeight:600,fontSize:14 }}>vs {gm.opponent}</span>
                  <span style={{ fontWeight:900,fontFamily:"Arial Black,sans-serif",fontSize:15 }}>{gm.teamScore}–{gm.oppScore}</span>
                  <span style={{ fontSize:11,color:"#94a3b8",fontFamily:"sans-serif" }}>{gm.date}</span>
                </div>
              ))}
            </div>
          )}

        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
